services:
  - type: web
    name: koziko-api
    env: node
    region: frankfurt
    plan: starter
    buildCommand: npm ci --include=dev && npm run build && npm run migration:run
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      - key: THROTTLE_TTL
        value: 60000
      - key: THROTTLE_LIMIT
        value: 10

# Optionnel : Service pour la base de données si tu veux l'héberger sur Render
# (mais Neon est recommandé pour PostgreSQL)